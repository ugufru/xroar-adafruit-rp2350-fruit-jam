; xroar-adafruit-rp2350-fruit-jam PlatformIO configuration
; XRoar (Dragon / Tandy CoCo emulator) for the Adafruit Fruit Jam (RP2350B).
;
; Build:   pio run              (or ./deploy.sh --build-only)
; Upload:  pio run -t upload    (or ./deploy.sh)
; Monitor: pio device monitor   (or ./deploy.sh --monitor)
;
; Toolchain decision: FRUITJAM-02 — PlatformIO + earlephilhower arduino-pico.
; Rationale in docs/, issue FRUITJAM-02.

[platformio]
default_envs = fruitjam

; --- Adafruit Fruit Jam (RP2350B, 48 GPIO, 16 MB flash + 8 MB PSRAM) ---
[env:fruitjam]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = adafruit_fruitjam
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0

; The adafruit_fruitjam variant already selects the RP2350B (PICO_RP2350A=0),
; sets PSRAM size, LED/pin macros, and USB VID/PID. We pin PICO_RP2350A=0
; explicitly too, as a belt-and-braces guard (43b lesson: B variant = 48 GPIO).
build_flags =
    -DARDUINO_ARCH_RP2040
    -O2
    -DPICO_RP2350A=0

; CRITICAL (COCO-30 / AMOLED lesson): the earlephilhower core appends -Os AFTER
; our flags, last-wins, so without this our -O2 is silently overridden for every
; translation unit — including the emulator hot loop. Strip it.
build_unflags = -Os

; Deep dependency resolution for cross-library includes (needed once the XRoar
; core + machine glue land; harmless for the bring-up scaffold).
lib_ldf_mode = deep+

monitor_speed = 115200

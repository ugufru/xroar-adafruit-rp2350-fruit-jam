; xroar-adafruit-rp2350-fruit-jam PlatformIO configuration
; XRoar (Dragon / Tandy CoCo emulator) for the Adafruit Fruit Jam (RP2350B).
;
; Build:   pio run              (or ./deploy.sh --build-only)
; Upload:  pio run -t upload    (or ./deploy.sh)
; Monitor: pio device monitor   (or ./deploy.sh --monitor)
;
; Toolchain decision: FRUITJAM-02 — PlatformIO + earlephilhower arduino-pico.
; Rationale in docs/, issue FRUITJAM-02.

[platformio]
default_envs = fruitjam

; --- Shared base: Adafruit Fruit Jam (RP2350B, 48 GPIO, 16 MB flash + 8 MB PSRAM) ---
[fruitjam_base]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = adafruit_fruitjam
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 0

; The adafruit_fruitjam variant already selects the RP2350B (PICO_RP2350A=0),
; sets PSRAM size, LED/pin macros, and USB VID/PID. We pin PICO_RP2350A=0
; explicitly too, as a belt-and-braces guard (43b lesson: B variant = 48 GPIO).
build_flags =
    -DARDUINO_ARCH_RP2040
    -O2
    -DPICO_RP2350A=0

; CRITICAL (COCO-30 / AMOLED lesson): the earlephilhower core appends -Os AFTER
; our flags, last-wins, so without this our -O2 is silently overridden for every
; translation unit — including the emulator hot loop. Strip it.
build_unflags = -Os

; Deep dependency resolution for cross-library includes (needed once the XRoar
; core + machine glue land; harmless for the bring-up scaffold).
lib_ldf_mode = deep+

monitor_speed = 115200

; --- Production / bring-up scaffold (blink + serial hello) ---
[env:fruitjam]
extends = fruitjam_base
build_src_filter = +<*> -<clock_probe.cpp> -<display/> -<sd/> -<smoke/> -<cocoboot/> -<coco/> -<usbkbd/>

; --- Diagnostic: 252 MHz clock-plan probe (FRUITJAM-03) ---
[env:clockprobe]
extends = fruitjam_base
build_src_filter = +<clock_probe.cpp>

; --- HSTX DVI test pattern (FRUITJAM-04) ---
; MODE_HSTX_CLK_DIV=2: with clk_sys=252 MHz the vendored pico_hdmi derives
; clk_hstx = 252/2 = 126 MHz (FRUITJAM-03). Only display_test.cpp is built;
; dvi_timing.h/framebuffer.h are header-only.
[env:display]
extends = fruitjam_base
build_flags = ${fruitjam_base.build_flags} -DMODE_HSTX_CLK_DIV=2
build_src_filter = +<display/display_test.cpp>

; --- microSD bring-up: SPI + FatFs (FRUITJAM-06) ---
; carlk3's library (same as the prior ports) drives the on-board slot on SPI0.
[env:sdtest]
extends = fruitjam_base
build_src_filter = +<sd/>
lib_deps = carlk3/no-OS-FatFS-SD-SDIO-SPI-RPi-Pico@^3.5.1

; --- Headless XRoar-core smoke test (FRUITJAM-09) ---
; Vendors lib/xroar_core (auto-discovered) and runs N MC6809 cycles of the
; Color BASIC ROM against a flat 64 KB map. Reuses the SD hw_config from the
; sdtest env to load the ROM off the card.
;   PICO_BUILD    → triggers hot.h's HOT_FUNC .time_critical placement
;   HAVE_CONFIG_H → makes top-config.h pull in our hand-written config.h
[env:smoke]
extends = fruitjam_base
build_src_filter = +<smoke/> +<sd/hw_config.c>
build_flags =
    ${fruitjam_base.build_flags}
    -DPICO_BUILD
    -DHAVE_CONFIG_H
    -I lib/xroar_core/include
    -I lib/xroar_core/src
    -I lib/xroar_core/src/mc6809
    -I lib/xroar_core/src/mc6847
    -I lib/xroar_core/portalib
lib_deps = carlk3/no-OS-FatFS-SD-SDIO-SPI-RPi-Pico@^3.5.1

; --- Headless CoCo machine boot test (FRUITJAM-22) ---
; Builds the hand-written lib/coco_machine glue over lib/xroar_core, loads the
; Color BASIC ROM off SD, and boots it headless (no display). Verifies the CPU
; idles in ROM and the 60 Hz field-sync IRQ source is live.
;   SUPPRESS_RENDER_SCANLINE reserved for FRUITJAM-23/15 (perf); our render_line
;   callback already no-ops, so it is not defined yet.
[env:cocoboot]
extends = fruitjam_base
build_src_filter = +<cocoboot/> +<sd/hw_config.c>
build_flags =
    ${fruitjam_base.build_flags}
    -DPICO_BUILD
    -DHAVE_CONFIG_H
    -I lib/xroar_core/include
    -I lib/xroar_core/src
    -I lib/xroar_core/src/mc6809
    -I lib/xroar_core/src/mc6847
    -I lib/xroar_core/portalib
    -I lib/coco_machine/src
lib_deps = carlk3/no-OS-FatFS-SD-SDIO-SPI-RPi-Pico@^3.5.1

; --- Boot Color BASIC to the monitor: the integration milestone (FRUITJAM-25) ---
; Machine (coco_machine) + VDG renderer + SD ROM load + pico_hdmi HSTX scanout.
; MODE_HSTX_CLK_DIV=2: clk_hstx = 252/2 = 126 MHz (FRUITJAM-03/-04).
[env:coco]
extends = fruitjam_base
build_src_filter = +<coco/> +<sd/hw_config.c>
build_flags =
    ${fruitjam_base.build_flags}
    -DPICO_BUILD
    -DHAVE_CONFIG_H
    -DMODE_HSTX_CLK_DIV=2
    -DPICO_HDMI_PRECOMPOSED_ACTIVE_LINES
    -DSUPPRESS_RENDER_SCANLINE
    -DUSE_TINYUSB
    -DCFG_TUH_RPI_PIO_USB=1
    -DCFG_TUH_HID=4
    -DCFG_TUH_HUB=1
    -DCFG_TUH_HID_EPIN_BUFSIZE=64
    -DCFG_TUH_HID_EPOUT_BUFSIZE=64
    -I lib/xroar_core/include
    -I lib/xroar_core/src
    -I lib/xroar_core/src/mc6809
    -I lib/xroar_core/src/mc6847
    -I lib/xroar_core/portalib
    -I lib/coco_machine/src
    -I src/display
lib_deps =
    carlk3/no-OS-FatFS-SD-SDIO-SPI-RPi-Pico@^3.5.1
    adafruit/Adafruit TinyUSB Library
    https://github.com/sekigon-gonnoc/Pico-PIO-USB.git

; --- USB HID keyboard bring-up: PIO-USB host + CH334F hub (FRUITJAM-05) ---
; Adafruit TinyUSB (host mode) + Pico-PIO-USB, same stack as the pizero port.
; CFG_TUH_HUB=1 is the new bit (both USB-A jacks are behind the on-board hub).
[env:usbkbd]
extends = fruitjam_base
build_src_filter = +<usbkbd/>
build_flags =
    ${fruitjam_base.build_flags}
    -DUSE_TINYUSB
    -DCFG_TUH_RPI_PIO_USB=1
    -DCFG_TUH_HID=4
    -DCFG_TUH_HUB=1
    -DCFG_TUH_HID_EPIN_BUFSIZE=64
    -DCFG_TUH_HID_EPOUT_BUFSIZE=64
lib_deps =
    adafruit/Adafruit TinyUSB Library
    https://github.com/sekigon-gonnoc/Pico-PIO-USB.git
